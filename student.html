<!DOCTYPE html>
<html>
<head>
  <title>SmartHire - Student</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

  <h1>Find Your Match 🔥</h1>

  <div class="card" id="card">
    <img src="IBM.png" alt="job">

    <h2 id="jobTitle">Frontend Developer</h2>

    <p id="match">Match: 80%</p>
    <p id="reason">Matched: React, JavaScript</p>

    <p class="status">✅ Eligible</p>
  </div>

  <div class="buttons">
    <button onclick="skip()">❌ Skip</button>
    <button onclick="like()">❤️ Interested</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>

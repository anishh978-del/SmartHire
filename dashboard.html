<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - SmartHire</title>
  <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>SmartHire</h2>

    <ul>
      <li onclick="goDashboard()">🏠 Dashboard</li>
      <li onclick="goMatches()">🔥 Find Matches</li>
      <li onclick="goResume()">📄 Resume Report</li>
      <li onclick="goProfile()">👤 Profile</li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- TOP BAR -->
    <div class="topbar">
      <h2>Welcome, Anish 👋</h2>
      <div>
        🔔 Notifications &nbsp;&nbsp; 👤
      </div>
    </div>

    <!-- CARDS -->
    <div class="cards">

      <div class="card-box">
        <h3>Find Jobs</h3>
        <p>Swipe and find best matches</p>
        <button onclick="goMatches()">Explore</button>
      </div>

      <div class="card-box">
        <h3>Resume Score</h3>
        <p>Your resume strength</p>
        <button onclick="goResume()">View</button>
      </div>

      <div class="card-box">
        <h3>Profile</h3>
        <p>Update your details</p>
        <button onclick="goProfile()">Edit</button>
        <div class="graph-section">
 
      </div>
 

    </div>

  </div>
  <div class="stats">

  <div class="stat-box">
    <h2 class="counter" data-target="58">0</h2>
    <p>Profile Views</p>
  </div>

  <div class="stat-box">
    <h2 class="counter" data-target="24">0</h2>
    <p>Applications</p>
  </div>

  <div class="stat-box">
    <h2 class="counter" data-target="12">0</h2>
    <p>Matches</p>
  </div>

</div>
  <div class="graph-section">
  <h3>Your Performance 📊</h3>
  <canvas id="myChart"></canvas>
</div>

</div>


<script src="script.js"></script>
</body>
</html>
